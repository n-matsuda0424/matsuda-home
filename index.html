<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="仕入れサポート">
<title>マツダホーム 仕入れサポート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #2e2e2e;
  --accent: #e8b84b;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #444;
  --danger: #e05252;
  --success: #52b788;
  --r: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; overflow:hidden; }
#app { display:flex; flex-direction:column; height:100dvh; }

#header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 16px 10px; padding-top:calc(14px + env(safe-area-inset-top,0px)); display:flex; align-items:center; gap:10px; flex-shrink:0; }
.logo { font-size:10px; color:var(--accent); font-weight:700; letter-spacing:.12em; font-family:'DM Mono',monospace; }
.title { font-size:16px; font-weight:600; flex:1; }
.badge { background:var(--accent); color:#000; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; font-family:'DM Mono',monospace; }

#tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.tab { flex:1; padding:10px 4px; text-align:center; font-size:11px; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; font-weight:500; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-icon { font-size:20px; display:block; margin-bottom:2px; }

#main { flex:1; position:relative; overflow:hidden; }
.view { position:absolute; inset:0; display:none; flex-direction:column; }
.view.active { display:flex; }
.scroll { flex:1; overflow-y:auto; padding-bottom:calc(20px + env(safe-area-inset-bottom,0px)); }

/* Map */
#map { flex:1; height:100%; width:100%; background:#1a1a1a; }
.leaflet-tile { filter:brightness(.65) saturate(.7) hue-rotate(-8deg); }
.leaflet-container { background:#0f0f0f; font-family:'Noto Sans JP',sans-serif; }
.leaflet-control-zoom a { background:rgba(26,26,26,.9)!important; color:var(--text)!important; border:1px solid var(--border)!important; }
.leaflet-control-attribution { background:rgba(0,0,0,.5)!important; color:var(--text3)!important; font-size:9px!important; }
.leaflet-control-attribution a { color:var(--text2)!important; }

#map-fab { position:absolute; bottom:calc(24px + env(safe-area-inset-bottom,0px)); right:16px; width:60px; height:60px; border-radius:50%; background:var(--accent); color:#000; font-size:30px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 24px rgba(232,184,75,.5); z-index:1000; transition:transform .15s; font-weight:300; }
#map-fab:active { transform:scale(.92); }
#locate-btn { position:absolute; bottom:calc(96px + env(safe-area-inset-bottom,0px)); right:16px; width:44px; height:44px; border-radius:50%; background:rgba(26,26,26,.9); color:var(--accent); font-size:18px; border:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(8px); }
.map-instruction { position:absolute; top:14px; left:50%; transform:translateX(-50%); background:rgba(26,26,26,.92); color:var(--text); font-size:12px; padding:8px 14px; border-radius:20px; z-index:1000; backdrop-filter:blur(8px); border:1px solid var(--border); white-space:nowrap; box-shadow:0 4px 12px rgba(0,0,0,.4); pointer-events:none; }
.tap-mode .map-instruction { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.04)} }

/* Pin marker */
.pin-marker { width:24px; height:24px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); border:2px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.4); position:relative; }
.pin-marker::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:8px; height:8px; background:#fff; border-radius:50%; }
.pin-land { background:#e8b84b; }
.pin-house { background:#52b788; }
.pin-building { background:#9999ff; }

/* Cards */
.property-card { margin:8px 12px; background:var(--surface); border-radius:var(--r); border:1px solid var(--border); overflow:hidden; animation:slideIn .25s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.card-top { padding:12px 14px 8px; display:flex; align-items:flex-start; gap:10px; }
.card-type { font-size:10px; font-weight:700; letter-spacing:.08em; padding:3px 8px; border-radius:20px; font-family:'DM Mono',monospace; flex-shrink:0; margin-top:1px; }
.type-land { background:rgba(232,184,75,.15); color:var(--accent); }
.type-house { background:rgba(82,183,136,.15); color:var(--success); }
.type-building { background:rgba(136,136,255,.15); color:#9999ff; }
.card-info { flex:1; min-width:0; }
.card-address { font-size:13px; font-weight:600; line-height:1.4; }
.card-meta { font-size:11px; color:var(--text2); margin-top:3px; }
.card-status-badge { font-size:10px; font-family:'DM Mono',monospace; flex-shrink:0; padding:2px 0; }
.s-new { color:var(--accent); }
.s-queued { color:var(--success); }
.s-sent { color:var(--text3); }
.card-actions { padding:0 14px 12px; display:flex; gap:6px; flex-wrap:wrap; }

.btn { padding:7px 12px; border-radius:8px; font-size:12px; font-weight:500; border:none; cursor:pointer; transition:all .15s; font-family:'Noto Sans JP',sans-serif; display:inline-flex; align-items:center; gap:4px; }
.btn:active { transform:scale(.95); }
.btn-primary { background:var(--accent); color:#000; }
.btn-secondary { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }
.btn-danger { background:rgba(224,82,82,.12); color:var(--danger); border:1px solid rgba(224,82,82,.2); }
.btn-success { background:rgba(82,183,136,.12); color:var(--success); border:1px solid rgba(82,183,136,.2); }
.btn-map { background:rgba(66,133,244,.12); color:#6ab0ff; border:1px solid rgba(66,133,244,.2); }

.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text3); gap:10px; padding:60px 20px; }
.empty-icon { font-size:52px; opacity:.25; }

.queue-card { margin:0 12px 8px; background:var(--surface); border-radius:var(--r); border:1px solid var(--border); padding:14px; }
.queue-name { font-size:15px; font-weight:600; margin-bottom:3px; }
.queue-addr { font-size:11px; color:var(--text2); margin-bottom:10px; }
.queue-preview { background:var(--surface2); border-radius:8px; padding:10px 12px; font-size:11px; color:var(--text2); line-height:1.8; margin-bottom:10px; border-left:2px solid var(--accent); white-space:pre-wrap; }
.queue-actions { display:flex; gap:6px; }
.csv-bar { margin:12px 12px 4px; background:var(--surface); border-radius:var(--r); border:1px solid var(--accent); padding:14px; display:flex; align-items:center; gap:12px; }
.csv-info { flex:1; }
.csv-label { font-size:13px; font-weight:600; }
.csv-sub { font-size:11px; color:var(--text2); margin-top:2px; }
.section-pad { padding:16px 12px 8px; }
.section-label { font-size:11px; color:var(--text3); font-family:'DM Mono',monospace; letter-spacing:.05em; text-transform:uppercase; margin-bottom:10px; }

.overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:2000; display:flex; align-items:flex-end; justify-content:center; backdrop-filter:blur(6px); animation:fadeIn .2s; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal { background:var(--surface); border-radius:20px 20px 0 0; width:100%; max-width:600px; max-height:90dvh; overflow-y:auto; padding:20px 16px calc(24px + env(safe-area-inset-bottom,0px)); animation:slideUp .3s cubic-bezier(.32,.72,0,1); }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 18px; }
.modal-title { font-size:18px; font-weight:700; margin-bottom:18px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:10px; color:var(--text2); margin-bottom:6px; font-family:'DM Mono',monospace; text-transform:uppercase; letter-spacing:.06em; }
.field input,.field select,.field textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:11px 12px; color:var(--text); font-size:14px; font-family:'Noto Sans JP',sans-serif; outline:none; transition:border-color .15s; }
.field input:focus,.field select:focus,.field textarea:focus { border-color:var(--accent); }
.field textarea { resize:none; line-height:1.6; }
.field select option { background:var(--surface2); }
.modal-actions { display:flex; gap:8px; margin-top:20px; }
.modal-actions .btn { flex:1; justify-content:center; padding:14px; font-size:14px; }
.divider { height:1px; background:var(--border); margin:16px 0; }

.pin-info { background:rgba(232,184,75,.08); border:1px solid rgba(232,184,75,.25); border-radius:8px; padding:10px 12px; margin-bottom:14px; font-size:12px; color:var(--accent); display:flex; align-items:center; gap:8px; }

.pdf-box { background:var(--surface2); border:1px dashed var(--border); border-radius:10px; padding:14px; margin-bottom:14px; }
.pdf-box-title { font-size:12px; color:var(--text2); margin-bottom:10px; }
.pdf-pick-btn { width:100%; padding:10px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--accent); font-size:13px; font-weight:600; cursor:pointer; font-family:'Noto Sans JP',sans-serif; }
.pdf-loading { margin-top:10px; font-size:12px; color:var(--text2); display:flex; align-items:center; gap:8px; }
.spinner { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
@keyframes spin { to{transform:rotate(360deg)} }
.pdf-ok { margin-top:10px; padding:10px; background:rgba(82,183,136,.1); border-radius:8px; border:1px solid rgba(82,183,136,.25); font-size:12px; color:var(--success); }
.pdf-err { margin-top:10px; padding:10px; background:rgba(224,82,82,.1); border-radius:8px; border:1px solid rgba(224,82,82,.25); font-size:12px; color:var(--danger); }

#toast { position:fixed; top:calc(16px + env(safe-area-inset-top,0px)); left:50%; transform:translateX(-50%); background:#1e1e1e; color:var(--text); font-size:13px; padding:10px 18px; border-radius:20px; z-index:9999; border:1px solid var(--border); opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,.5); }
#toast.show { opacity:1; }

.geo-loading { position:absolute; bottom:24px; left:16px; background:rgba(26,26,26,.92); color:var(--text2); font-size:11px; padding:8px 12px; border-radius:20px; z-index:1000; backdrop-filter:blur(8px); border:1px solid var(--border); display:none; align-items:center; gap:8px; }
.geo-loading.show { display:flex; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div style="flex:1">
      <div class="logo">Matsuda Home</div>
      <div class="title">仕入れサポート</div>
    </div>
    <div class="badge" id="queue-count">0件</div>
  </div>

  <div id="tabs">
    <div class="tab active" onclick="switchTab('map')"><span class="tab-icon">🗺️</span>マップ</div>
    <div class="tab" onclick="switchTab('list')"><span class="tab-icon">📋</span>物件一覧</div>
    <div class="tab" onclick="switchTab('queue')"><span class="tab-icon">📮</span>郵送キュー</div>
  </div>

  <div id="main">
    <div class="view active" id="view-map">
      <div id="map"></div>
      <div class="map-instruction" id="map-hint">＋ボタンを押して物件を追加</div>
      <button id="locate-btn" onclick="locateMe()" title="現在地">📍</button>
      <button id="map-fab" onclick="enterTapMode()">＋</button>
      <div class="geo-loading" id="geo-loading"><div class="spinner"></div>住所を取得中...</div>
    </div>

    <div class="view" id="view-list">
      <div class="scroll">
        <div id="list-empty" class="empty" style="display:none">
          <div class="empty-icon">🏚️</div>
          <div>物件がまだありません</div>
          <div style="font-size:12px">マップ画面でピンを刺してください</div>
        </div>
        <div id="property-list"></div>
      </div>
    </div>

    <div class="view" id="view-queue">
      <div class="scroll">
        <div id="csv-bar-wrap"></div>
        <div class="section-pad"><div class="section-label">送付待ちリスト</div></div>
        <div id="queue-list"></div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="modal" style="display:none" onclick="overlayClose(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">物件を追加</div>

    <div class="pin-info" id="pin-info" style="display:none">
      📍 <span id="pin-info-text">マップでピンを刺した場所</span>
    </div>

    <div class="field">
      <label>物件種別</label>
      <select id="f-type">
        <option value="land">🟡 土地</option>
        <option value="house">🟢 空き家</option>
        <option value="building">🔵 建物</option>
      </select>
    </div>
    <div class="field">
      <label>住所</label>
      <input id="f-address" type="text" placeholder="ピンを刺すと自動入力されます">
    </div>
    <div class="field">
      <label>地番（任意）</label>
      <input id="f-chiban" type="text" placeholder="例：123番4">
    </div>
    <div class="field">
      <label>メモ（任意）</label>
      <textarea id="f-memo" rows="2" placeholder="気になる点など"></textarea>
    </div>

    <div class="divider"></div>

    <div style="background:rgba(232,184,75,.06);border:1px solid rgba(232,184,75,.2);border-radius:10px;padding:12px;margin-bottom:14px;">
      <div style="font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:8px;letter-spacing:.05em;">📋 STEP 1 / 3</div>
      <div style="font-size:13px;font-weight:600;margin-bottom:4px;">地番を調べる</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.6;">住所から地番を検索します。地図上でタップすると地番がわかります。</div>
      <button class="btn btn-secondary" style="width:100%;justify-content:center;" onclick="openChibanSearch()">🔍 地番検索サービスを開く</button>
    </div>

    <div style="background:rgba(232,184,75,.06);border:1px solid rgba(232,184,75,.2);border-radius:10px;padding:12px;margin-bottom:14px;">
      <div style="font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:8px;letter-spacing:.05em;">📋 STEP 2 / 3</div>
      <div style="font-size:13px;font-weight:600;margin-bottom:4px;">謄本を取得する</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.6;">調べた地番で登記情報提供サービスから謄本をダウンロード。</div>
      <button class="btn btn-secondary" style="width:100%;justify-content:center;" onclick="openTouki()">📄 登記情報提供サービスを開く</button>
    </div>

    <div style="background:rgba(232,184,75,.06);border:1px solid rgba(232,184,75,.2);border-radius:10px;padding:12px;margin-bottom:14px;">
      <div style="font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:8px;letter-spacing:.05em;">📋 STEP 3 / 3</div>
      <div style="font-size:13px;font-weight:600;margin-bottom:4px;">所有者を自動抽出</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.6;">ダウンロードした謄本PDFを選択するとAIが情報を抽出します。</div>
      <input type="file" id="pdf-input" accept=".pdf" style="display:none" onchange="handlePDF(event)">
      <button class="pdf-pick-btn" onclick="document.getElementById('pdf-input').click()">📥 PDFを選択する</button>
      <div id="pdf-loading" class="pdf-loading" style="display:none"><div class="spinner"></div>AIが読み取り中...</div>
      <div id="pdf-result" style="display:none"></div>
    </div>

    <div class="field">
      <label>所有者名</label>
      <input id="f-owner" type="text" placeholder="謄本PDFから自動入力されます">
    </div>
    <div class="field">
      <label>所有者住所</label>
      <input id="f-owner-addr" type="text" placeholder="謄本PDFから自動入力されます">
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveProperty()">保存する</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const typeColors = { land:'#e8b84b', house:'#52b788', building:'#9999ff' };
const typeLabels = { land:'土地', house:'空き家', building:'建物' };
let properties = [], queue = [], editingId = null;
let map, markers = {}, tapMode = false, currentLat = null, currentLng = null;

function load() {
  try { properties = JSON.parse(localStorage.getItem('mh_props')||'[]'); } catch(e){ properties=[]; }
  try { queue = JSON.parse(localStorage.getItem('mh_queue')||'[]'); } catch(e){ queue=[]; }
}
function save() {
  localStorage.setItem('mh_props', JSON.stringify(properties));
  localStorage.setItem('mh_queue', JSON.stringify(queue));
}

function initMap() {
  map = L.map('map', { zoomControl: true, attributionControl: true }).setView([34.6937, 135.5023], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '© OpenStreetMap'
  }).addTo(map);
  map.on('click', onMapClick);
  properties.forEach(addMarkerForProperty);
  setTimeout(() => map.invalidateSize(), 100);
}

function enterTapMode() {
  tapMode = true;
  document.getElementById('view-map').classList.add('tap-mode');
  document.getElementById('map-hint').textContent = '🎯 マップ上の物件をタップ';
  showToast('物件の場所をタップしてください');
}

function exitTapMode() {
  tapMode = false;
  document.getElementById('view-map').classList.remove('tap-mode');
  document.getElementById('map-hint').textContent = '＋ボタンを押して物件を追加';
}

async function onMapClick(e) {
  if(!tapMode) return;
  exitTapMode();
  currentLat = e.latlng.lat;
  currentLng = e.latlng.lng;
  document.getElementById('geo-loading').classList.add('show');
  const addr = await reverseGeocode(currentLat, currentLng);
  document.getElementById('geo-loading').classList.remove('show');
  openAddModal();
  document.getElementById('f-address').value = addr;
  document.getElementById('pin-info').style.display = 'flex';
  document.getElementById('pin-info-text').textContent = `緯度 ${currentLat.toFixed(5)}, 経度 ${currentLng.toFixed(5)}`;
}

async function reverseGeocode(lat, lng) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ja&zoom=18`);
    const data = await res.json();
    if(!data.address) return '';
    const a = data.address;
    const parts = [
      a.postcode ? '〒'+a.postcode+' ' : '',
      a.state || '',
      a.city || a.town || a.village || a.county || '',
      a.suburb || a.neighbourhood || '',
      a.quarter || '',
      a.road || '',
      a.house_number || ''
    ].filter(Boolean);
    return parts.join('').replace(/^〒\d+\s/, m => m);
  } catch(e) { return ''; }
}

function locateMe() {
  if(!navigator.geolocation) { showToast('位置情報が使えません'); return; }
  showToast('現在地を取得中...');
  navigator.geolocation.getCurrentPosition(
    pos => { map.setView([pos.coords.latitude, pos.coords.longitude], 17); showToast('現在地を表示しました'); },
    err => { showToast('位置情報が取得できませんでした'); },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function addMarkerForProperty(p) {
  if(markers[p.id]) { map.removeLayer(markers[p.id]); delete markers[p.id]; }
  if(!p.lat || !p.lng) return;
  const icon = L.divIcon({
    className:'',
    html: `<div class="pin-marker pin-${p.type}"></div>`,
    iconSize:[24,24], iconAnchor:[12,24]
  });
  const m = L.marker([p.lat, p.lng], { icon }).addTo(map);
  m.on('click', () => openEditModal(p.id));
  m.bindTooltip(p.address || '無題', { direction:'top', offset:[0,-20] });
  markers[p.id] = m;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['map','list','queue'][i]===tab));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  if(tab==='map' && map) setTimeout(() => map.invalidateSize(), 50);
  if(tab==='list') renderList();
  if(tab==='queue') renderQueue();
}

function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent='物件を追加';
  document.getElementById('f-type').value='land';
  ['f-address','f-chiban','f-memo','f-owner','f-owner-addr'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pdf-result').style.display='none';
  document.getElementById('pdf-loading').style.display='none';
  if(currentLat && currentLng) {
    document.getElementById('pin-info').style.display = 'flex';
    document.getElementById('pin-info-text').textContent = `緯度 ${currentLat.toFixed(5)}, 経度 ${currentLng.toFixed(5)}`;
  } else {
    document.getElementById('pin-info').style.display = 'none';
  }
  document.getElementById('modal').style.display='flex';
}
function openEditModal(id) {
  const p = properties.find(x=>x.id===id); if(!p) return;
  editingId = id;
  currentLat = p.lat; currentLng = p.lng;
  document.getElementById('modal-title').textContent='物件を編集';
  document.getElementById('f-type').value=p.type;
  document.getElementById('f-address').value=p.address;
  document.getElementById('f-chiban').value=p.chiban||'';
  document.getElementById('f-memo').value=p.memo||'';
  document.getElementById('f-owner').value=p.owner||'';
  document.getElementById('f-owner-addr').value=p.ownerAddr||'';
  document.getElementById('pdf-result').style.display='none';
  document.getElementById('pdf-loading').style.display='none';
  if(p.lat && p.lng) {
    document.getElementById('pin-info').style.display = 'flex';
    document.getElementById('pin-info-text').textContent = `緯度 ${p.lat.toFixed(5)}, 経度 ${p.lng.toFixed(5)}`;
  } else {
    document.getElementById('pin-info').style.display = 'none';
  }
  document.getElementById('modal').style.display='flex';
}
function closeModal() {
  document.getElementById('modal').style.display='none';
  currentLat = null; currentLng = null;
}
function overlayClose(e) { if(e.target.id==='modal') closeModal(); }

function saveProperty() {
  const address = document.getElementById('f-address').value.trim();
  if(!address){ showToast('住所を入力してください'); return; }
  const now = Date.now();
  const ex = editingId ? properties.find(x=>x.id===editingId) : null;
  const p = {
    id: editingId||now.toString(),
    type: document.getElementById('f-type').value,
    address,
    chiban: document.getElementById('f-chiban').value.trim(),
    memo: document.getElementById('f-memo').value.trim(),
    owner: document.getElementById('f-owner').value.trim(),
    ownerAddr: document.getElementById('f-owner-addr').value.trim(),
    lat: currentLat || (ex ? ex.lat : null),
    lng: currentLng || (ex ? ex.lng : null),
    createdAt: ex?ex.createdAt:now,
    status: ex?ex.status:'new'
  };
  if(editingId){ const i=properties.findIndex(x=>x.id===editingId); properties[i]=p; }
  else properties.unshift(p);
  save(); closeModal();
  addMarkerForProperty(p);
  renderList(); updateBadge();
  showToast(editingId?'更新しました ✓':'物件を追加しました ✓');
}

function deleteProperty(id) {
  if(!confirm('この物件を削除しますか？')) return;
  properties = properties.filter(x=>x.id!==id);
  queue = queue.filter(q=>q.propertyId!==id);
  if(markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
  save(); renderList(); renderQueue(); updateBadge();
  showToast('削除しました');
}

function openTouki() {
  const addr = document.getElementById('f-address').value.trim();
  window.open('https://www1.touki.or.jp/gateway.html'+(addr?'?addr='+encodeURIComponent(addr):''),'_blank');
}

function openChibanSearch() {
  const addr = document.getElementById('f-address').value.trim();
  const lat = currentLat;
  const lng = currentLng;
  // 法務省地図検索（地番がわかる地図）+ Googleマップで位置確認も併用
  // 法務省の公式地図：https://www.chiseki.go.jp/atlas/index.html
  // 一番使いやすいのは「登記情報提供サービス」の地番検索（要会員）
  // 無料で使えるのは「Mapion地番検索」
  if(lat && lng) {
    // ピン座標があればその位置でMapion地番検索を開く
    window.open(`https://www.mapion.co.jp/m2/${lat},${lng},17/poi=ILSP0001`,'_blank');
  } else if(addr) {
    // 住所だけある場合は住所検索
    window.open('https://www.mapion.co.jp/address/'+encodeURIComponent(addr),'_blank');
  } else {
    window.open('https://www.mapion.co.jp/','_blank');
  }
  showToast('地図上で地番を確認してください');
}

async function handlePDF(e) {
  const file = e.target.files[0]; if(!file) return;
  document.getElementById('pdf-loading').style.display='flex';
  document.getElementById('pdf-result').style.display='none';
  try {
    const b64 = await toB64(file);
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:800,
        messages:[{role:'user',content:[
          {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
          {type:'text',text:'この不動産登記謄本から以下をJSON形式のみで返してください。余計な文章不要。\n{"owner_name":"所有者名","owner_address":"所有者住所","chiban":"地番"}'}
        ]}]})
    });
    const data = await res.json();
    const text = (data.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);
    if(parsed.owner_name) document.getElementById('f-owner').value=parsed.owner_name;
    if(parsed.owner_address) document.getElementById('f-owner-addr').value=parsed.owner_address;
    if(parsed.chiban) document.getElementById('f-chiban').value=parsed.chiban;
    const r=document.getElementById('pdf-result');
    r.className='pdf-ok'; r.textContent='✓ 所有者：'+(parsed.owner_name||'不明')+' ／ 住所：'+(parsed.owner_address||'不明');
    r.style.display='block'; showToast('情報を自動抽出しました ✓');
  } catch(err) {
    const r=document.getElementById('pdf-result');
    r.className='pdf-err'; r.textContent='読み取りに失敗しました。手動で入力してください。'; r.style.display='block';
  }
  document.getElementById('pdf-loading').style.display='none';
  e.target.value='';
}
function toB64(file){
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
}

function genDM(p) {
  const d=new Date();
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日\n\n${p.owner||'　　　　'} 様\n\n突然のお手紙をお許しください。\n私どもマツダホーム株式会社と申します。\n\nこの度、${p.address}の物件につきまして、\nぜひご売却のご相談をさせていただきたく、ご連絡申し上げました。\n\n現在、当該エリアの物件を積極的にお探しのお客様がいらっしゃいます。\nもしご売却をご検討中であれば、ぜひお気軽にご相談ください。\n\nまずはご相談だけでも構いません。\n査定・ご相談は完全無料にて承っております。\n\n何卒よろしくお願い申し上げます。\n\n━━━━━━━━━━━━━━━\nマツダホーム株式会社\n担当：松田 信幸\nTEL：070-9059-8148\n━━━━━━━━━━━━━━━`;
}

function addToQueue(id) {
  const p=properties.find(x=>x.id===id); if(!p) return;
  if(!p.owner){ showToast('先に所有者情報を入力してください'); return; }
  if(queue.find(q=>q.propertyId===id)){ showToast('すでにキューに追加済みです'); return; }
  queue.push({id:Date.now().toString(),propertyId:id,dm:genDM(p),createdAt:Date.now()});
  p.status='queued'; save(); updateBadge(); renderList();
  showToast('郵送キューに追加しました 📮');
}
function removeFromQueue(qid) {
  const q=queue.find(x=>x.id===qid);
  if(q){const p=properties.find(x=>x.id===q.propertyId);if(p)p.status='new';}
  queue=queue.filter(x=>x.id!==qid); save(); updateBadge(); renderQueue(); renderList();
  showToast('キューから削除しました');
}
function markSent(qid) {
  const q=queue.find(x=>x.id===qid); if(!q) return;
  const p=properties.find(x=>x.id===q.propertyId); if(p)p.status='sent';
  queue=queue.filter(x=>x.id!==qid); save(); updateBadge(); renderQueue(); renderList();
  showToast('送付済みにしました ✓');
}
function exportCSV() {
  if(!queue.length){showToast('キューが空です');return;}
  const rows=[['所有者名','所有者住所','物件住所','地番','文面']];
  queue.forEach(q=>{
    const p=properties.find(x=>x.id===q.propertyId);
    if(p)rows.push([p.owner||'',p.ownerAddr||'',p.address||'',p.chiban||'',(q.dm||'').replace(/\n/g,' ')]);
  });
  const csv=rows.map(r=>r.map(c=>`"${c.replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=`郵送リスト_${new Date().toLocaleDateString('ja')}.csv`; a.click();
  showToast('CSVをダウンロードしました 📥');
}

function flyToProperty(id) {
  const p = properties.find(x=>x.id===id); if(!p || !p.lat) return;
  switchTab('map');
  setTimeout(() => { map.flyTo([p.lat, p.lng], 17, { duration: 0.8 }); }, 100);
}

function cardHTML(p) {
  const inQueue=queue.find(q=>q.propertyId===p.id);
  const statusEl=p.status==='sent'?'<span class="card-status-badge s-sent">送付済み</span>':inQueue?'<span class="card-status-badge s-queued">キュー中</span>':'<span class="card-status-badge s-new">未送付</span>';
  const dmBtn=!inQueue&&p.status!=='sent'?`<button class="btn btn-success" onclick="addToQueue('${p.id}')">📮 DM追加</button>`:'';
  const mapBtn = p.lat ? `<button class="btn btn-map" onclick="flyToProperty('${p.id}')">🗺️ 地図で見る</button>` : '';
  return `<div class="property-card">
    <div class="card-top">
      <span class="card-type type-${p.type}">${typeLabels[p.type]}</span>
      <div class="card-info">
        <div class="card-address">${p.address}</div>
        <div class="card-meta">${p.chiban?'地番：'+p.chiban+'　':''}${p.owner?'所有者：'+p.owner:'所有者未入力'}</div>
      </div>
      ${statusEl}
    </div>
    <div class="card-actions">
      ${mapBtn}
      <button class="btn btn-secondary" onclick="openEditModal('${p.id}')">✏️ 編集</button>
      ${dmBtn}
      <button class="btn btn-danger" onclick="deleteProperty('${p.id}')">削除</button>
    </div>
  </div>`;
}

function renderList() {
  const el=document.getElementById('property-list');
  const em=document.getElementById('list-empty');
  if(!properties.length){em.style.display='flex';el.innerHTML='';return;}
  em.style.display='none'; el.innerHTML=properties.map(cardHTML).join('');
}
function renderQueue() {
  const el=document.getElementById('queue-list');
  const cw=document.getElementById('csv-bar-wrap');
  if(!queue.length){
    cw.innerHTML='';
    el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div>キューが空です</div><div style="font-size:12px">物件一覧からDMを追加</div></div>';
    return;
  }
  cw.innerHTML=`<div class="csv-bar"><div class="csv-info"><div class="csv-label">郵送代行CSV</div><div class="csv-sub">${queue.length}件 準備完了</div></div><button class="btn btn-primary" onclick="exportCSV()">📥 CSV出力</button></div>`;
  el.innerHTML=queue.map(q=>{
    const p=properties.find(x=>x.id===q.propertyId); if(!p) return '';
    const preview=q.dm.split('\n').slice(0,8).join('\n');
    return `<div class="queue-card"><div class="queue-name">${p.owner||'所有者不明'} 様</div><div class="queue-addr">${p.address}</div><div class="queue-preview">${preview}…</div><div class="queue-actions"><button class="btn btn-success" onclick="markSent('${q.id}')">✓ 送付済み</button><button class="btn btn-danger" onclick="removeFromQueue('${q.id}')">削除</button></div></div>`;
  }).join('');
}
function updateBadge() { document.getElementById('queue-count').textContent=queue.length+'件'; }
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

load();
initMap();
updateBadge();
</script>
